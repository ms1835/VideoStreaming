name: Pipeline for CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            client/node_modules
            server/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd client && npm ci
          cd ../server && npm ci

      - name: Run lint
        run: |
          cd client && npm run lint || true
          cd ../server && npm run lint || true

      - name: Run tests
        run: |
          cd client && npm test -- --watchAll=false || true
          cd ../server && npm test || true

      - name: Build client
        run: |
          cd client && npm run build